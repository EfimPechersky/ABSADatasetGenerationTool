<!-- page4.html - Прогресс бар для генерации датасета -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шаг 4: Генерация датасета | Инструмент аннотации</title>
    <script src="https://cdn.jsdelivr.net/npm/jquery"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lodash"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container-custom { max-width: 800px; margin: 0 auto; }
        .form-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .progress-container { text-align: center; padding: 40px; }
        .progress-bar-custom {
            width: 100%;
            height: 30px;
            background-color: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .progress-status { font-size: 16px; color: #666; margin-top: 15px; }
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(102, 126, 234, 0.3);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-global {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: center;
        }
        .success-card {
            background: #d4edda;
            color: #155724;
            text-align: center;
        }
        .btn-restart {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .btn-restart:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
    </style>
</head>
<body>
<div id="app">
    <div class="container-custom">
        <div class="form-card" :class="{ 'success-card': isComplete }">
            <div class="progress-container">
                <div v-if="!isComplete" class="spinner"></div>
                <div v-else><i class="bi bi-check-circle-fill" style="font-size: 48px; color: #28a745;"></i></div>
                <h3 v-if="!isComplete">⏳ Генерация датасета на сервере</h3>
                <h3 v-else>✅ Датасет успешно сгенерирован!</h3>
                
                <div v-if="!isComplete" class="progress-bar-custom">
                    <div class="progress-fill" :style="{ width: (progress * 100) + '%' }">
                        {{ (progress * 100).toFixed(1) }}%
                    </div>
                </div>
                
                <div class="progress-status" v-if="!isComplete">
                    <strong>Статус:</strong> {{ progressStatus }}
                </div>
                
                <p v-if="!isComplete" class="text-muted mt-3">
                    <small>Пожалуйста, подождите. Сервер формирует итоговый датасет...</small>
                </p>
                
                <div v-if="isComplete" class="mt-3">
                    <p><strong>Датасет готов к использованию!</strong></p>
                    <p>Всего аннотировано отзывов: {{ savedReviewsCount }}</p>
                    <button class="btn-restart" @click="restartProcess">🔄 Начать новый процесс</button>
                </div>
                
                <div v-if="errorMsg" class="error-global">{{ errorMsg }}</div>
            </div>
        </div>
    </div>
</div>

<script>
new Vue({
    el: '#app',
    data: {
        processCode: null,
        progress: 0,
        progressStatus: 'Отправка данных на сервер...',
        pollingInterval: null,
        errorMsg: '',
        isComplete: false,
        savedReviewsCount: 0,
        savedReviews: [],
        domain: '',
        categories: []
    },
    async mounted() {
        const savedData = sessionStorage.getItem('datasetData');
        if (!savedData) {
            this.errorMsg = 'Данные не найдены. Пожалуйста, начните с первой страницы.';
            setTimeout(() => { window.location.href = 'page1.html'; }, 3000);
            return;
        }
        const data = JSON.parse(savedData);
        this.savedReviews = data.savedReviews;
        this.savedReviewsCount = data.savedReviews.length;
        this.domain = data.domain;
        this.categories = data.categories;
        
        await this.sendToServer();
    },
    beforeDestroy() {
        if (this.pollingInterval) clearInterval(this.pollingInterval);
    },
    methods: {
        async sendToServer() {
            // Форматируем данные для отправки на сервер
            let jsonformat = [];
            this.savedReviews.forEach(review => {
                let new_review = [];
                let new_aspects = {};
                let words = review.rvarr.map(w => w.tk);
                let sentence = words.map((w, i) => i === 0 ? w : ' ' + w).join('');
                new_review.push(sentence.replace(/"/g, "'"));
                review.rvarr.forEach((item, idx) => {
                    if (item.aspect && item.sentiment) {
                        let sentiment = item.sentiment === "Pos" ? "Positive" :
                                    item.sentiment === "Neu" ? "Neutral" : "Negative";
                        new_aspects[item.tk.replace(/[,.!]/g, "")] = sentiment;
                    }
                });
                new_review.push(new_aspects);
                jsonformat.push(new_review);
            });
            
            const requestData = {
                data: jsonformat,
                domain: this.domain
            };
            
            try {
                const response = await fetch('http://127.0.0.1:8000/save-reviews', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const result = await response.json();
                this.processCode = result.code;
                this.startPolling();
            } catch (err) {
                if (err.message.includes('Failed to fetch')) {
                    this.errorMsg = `❌ Не удалось подключиться к серверу. Убедитесь, что сервер запущен по адресу http://127.0.0.1:8000`;
                } else {
                    this.errorMsg = `❌ Ошибка при отправке данных: ${err.message}`;
                }
            }
        },
        
        startPolling() {
            if (this.pollingInterval) clearInterval(this.pollingInterval);
            this.pollingInterval = setInterval(async () => {
                try {
                    const response = await fetch(`http://127.0.0.1:8000/get_dataset_generation_status?code=${this.processCode}`);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const statusData = await response.json();
                    this.progress = statusData.progress;
                    this.progressStatus = statusData.status;
                    
                    if (statusData.status === 'Done') {
                        clearInterval(this.pollingInterval);
                        this.pollingInterval = null;
                        this.isComplete = true;
                        this.progress = 1;
                        this.progressStatus = 'Готово!';
                        clearInterval(this.pollingInterval);
                        this.pollingInterval = null;
                        // Сохраняем сгенерированные примеры и переходим к аннотации
                        const trainFormData = {
                            code:this.processCode
                        };
                        sessionStorage.setItem('trainFormData', JSON.stringify(trainFormData));
                        window.location.href = 'TrainModelForm.html';
                    }
                    if (statusData.status === 'Error') {
                        clearInterval(this.pollingInterval);
                        this.pollingInterval = null;
                        this.errorMsg = `Ошибка при генерации датасета: ${statusData.result || 'Неизвестная ошибка'}`;
                    }
                } catch (err) {
                    console.error('Ошибка при опросе статуса:', err);
                }
            }, 2000);
        },
        
        restartProcess() {
            sessionStorage.clear();
            window.location.href = 'page1.html';
        }
    }
});
</script>
</body>
</html>
